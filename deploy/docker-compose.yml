version: "3.9"

# ESPAI Hub — Docker Appliance Mode
#
# Start:   docker compose -f deploy/docker-compose.yml up -d
# Logs:    docker compose -f deploy/docker-compose.yml logs -f ESPAI
# Stop:    docker compose -f deploy/docker-compose.yml down
#
# The hub is reachable at http://<host-ip>:7888

services:

  ESPAI:
    build:
      context: ..
      dockerfile: hub/Dockerfile
    container_name: ESPAI
    restart: unless-stopped
    # host networking gives the hub direct LAN access for mDNS and subnet scan
    network_mode: host
    environment:
      - ESPAI_HOST=0.0.0.0
      - ESPAI_PORT=7888
      - ESPAI_DEBUG=0
    volumes:
      - ../data:/data
      - ../projects:/projects
      - ../recipes:/recipes
      - ../workers:/workers
      - ../cards:/cards
      - ../design:/design
      - ../firmware-catalog:/firmware-catalog
      - ../policies:/policies
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:7888/api/status')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Python worker sidecar — runs heavyweight jobs (OpenCV, FFmpeg, etc.)
  # Workers are picked up from the shared /workers volume.
  ESPAI-worker:
    image: python:3.12-slim
    container_name: ESPAI-worker
    restart: unless-stopped
    depends_on:
      - ESPAI
    volumes:
      - ../data:/data
      - ../workers:/workers
      - ../projects:/projects
    working_dir: /app
    # TODO: replace with a proper worker runner image
    command: ["python", "-c", "import time; print('ESPAI worker sidecar ready'); time.sleep(3600)"]
