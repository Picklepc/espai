; ╔══════════════════════════════════════════════════════╗
; ║  ESPAI Provisioning Firmware  ·  platformio.ini      ║
; ╚══════════════════════════════════════════════════════╝
;
; First-boot firmware for any ESP32.  Flash once via USB / TTL adapter,
; then configure everything else over WiFi from the browser portal.
;
; Flash:
;   pio run -e esp32dev --target upload
;   pio device monitor --baud 115200
;
; After flashing:
;   1.  Connect phone / laptop to WiFi:  ESPAI-Setup  /  espai1234
;   2.  Open browser → http://192.168.4.1
;   3.  Configure home WiFi and ESPAI Hub URL from the portal

[platformio]
default_envs = seeed_xiao_esp32s3

; ── Shared settings ────────────────────────────────────────────────────────
[env]
framework    = arduino
monitor_speed = 115200
lib_deps =
  bblanchon/ArduinoJson@^7.0.0
build_flags =
  -D FW_VERSION='"1.0.0"'
  -D FW_NAME='"ESPAI-Provision"'
  -D CORE_DEBUG_LEVEL=0

; ── Board targets ──────────────────────────────────────────────────────────
[env:esp32dev]
platform = espressif32
board    = esp32dev

[env:seeed_xiao_esp32s3]
platform = espressif32
board    = seeed_xiao_esp32s3

[env:lolin_s3]
platform = espressif32
board    = lolin_s3

[env:esp32-c3-devkitm-1]
platform = espressif32
board    = esp32-c3-devkitm-1
