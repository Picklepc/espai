; ESPAI Seed Firmware — PlatformIO configuration
;
; Wi-Fi credentials: supply via environment variables — never hardcode them.
;
;   Windows PowerShell:
;     $env:ESPAI_WIFI_SSID = "MyNetwork"
;     $env:ESPAI_WIFI_PASS = "mypassword"
;     pio run
;
;   Linux / macOS:
;     ESPAI_WIFI_SSID="MyNetwork" ESPAI_WIFI_PASS="mypassword" pio run
;
; If the env vars are not set the firmware falls back to AP mode.

[platformio]
default_envs = seeed_xiao_esp32s3

; ── Common settings shared by all environments ────────────────────────────────

[env]
framework    = arduino
monitor_speed = 115200
lib_deps =
  bblanchon/ArduinoJson@^7.0.0
build_flags =
  -D FW_VERSION=\"0.1.2\"
  -D WIFI_SSID=\"${sysenv.ESPAI_WIFI_SSID}\"
  -D WIFI_PASS=\"${sysenv.ESPAI_WIFI_PASS}\"
  ; -D HUB_URL=\"http://espai.local:7888\"      ; uncomment to enable hub checkin on boot
  ; -D HUB_PROJECT_ID=\"your-project-id\"        ; uncomment if using a project data store
  ; -D SLEEP_INTERVAL_S=60                       ; uncomment to enable deep sleep (seconds)

; ── Board environments ────────────────────────────────────────────────────────

[env:seeed_xiao_esp32s3]
platform = espressif32
board    = seeed_xiao_esp32s3
build_flags =
  ${env.build_flags}
  -D NODE_NAME=\"ESPAI-xiao\"
  -D BOARD_ID=\"seeed_xiao_esp32s3\"

[env:esp32dev]
platform = espressif32
board    = esp32dev
build_flags =
  ${env.build_flags}
  -D NODE_NAME=\"ESPAI-dev\"
  -D BOARD_ID=\"esp32dev\"

[env:lolin_s3]
platform = espressif32
board    = lolin_s3
build_flags =
  ${env.build_flags}
  -D NODE_NAME=\"ESPAI-lolin\"
  -D BOARD_ID=\"lolin_s3\"
