name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  # ── Windows build + Inno Setup installer ─────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-bundle.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller espai.spec --noconfirm

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        # Strip leading "v" from tag (v0.1.0 → 0.1.0) and pass to Inno Setup.
        run: |
          $ver = '${{ github.ref_name }}'.TrimStart('v')
          New-Item -ItemType Directory -Force installer-output | Out-Null
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
              "/DMyAppVersion=$ver" `
              installer\espai.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ESPAI-windows-installer
          path: installer-output\ESPAI-Setup-*.exe
          retention-days: 5

  # ── Linux build + AppImage ────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libzbar0 python3-gi gir1.2-appindicator3-0.1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-bundle.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller espai.spec --noconfirm

      - name: Generate app icon
        run: |
          python3 - << 'PYEOF'
          from PIL import Image, ImageDraw
          import math, os
          size = 256
          img = Image.new("RGBA", (size, size), (0, 0, 0, 0))
          draw = ImageDraw.Draw(img)
          cx, cy = size // 2, size // 2
          r = size * 0.36
          pts = [
              (cx,             cy - r),
              (cx + r,         cy),
              (cx + r * 0.50,  cy + r * 0.70),
              (cx - r * 0.50,  cy + r * 0.70),
              (cx - r,         cy),
          ]
          draw.polygon(pts, fill=(26, 175, 196, 230))
          s = 0.82
          inner = [(cx+(x-cx)*s, cy+(y-cy)*s) for x,y in pts]
          draw.polygon(inner, fill=(8, 12, 16, 240))
          star_r, star_w = size*0.15, size*0.04
          sp = []
          for i in range(8):
              a = math.radians(i*45-90)
              rad = star_r if i%2==0 else star_w
              sp.append((cx+rad*math.cos(a), cy+rad*math.sin(a)))
          draw.polygon(sp, fill=(240, 168, 32, 255))
          os.makedirs("AppDir", exist_ok=True)
          img.save("AppDir/espai.png")
          PYEOF

      - name: Assemble AppDir
        run: |
          cp -r dist/espai/. AppDir/

          cat > AppDir/AppRun << 'APPRUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          exec "${HERE}/espai" "$@"
          APPRUN
          chmod +x AppDir/AppRun

          cat > AppDir/espai.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=ESPAI
          Comment=Local-first ESP32 fleet management hub
          Exec=espai
          Icon=espai
          Type=Application
          Categories=Development;Utility;
          Terminal=false
          DESKTOP

      - name: Build AppImage
        run: |
          VER="${{ github.ref_name }}"
          VER="${VER#v}"
          wget -q \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage \
            -O appimagetool
          chmod +x appimagetool
          ./appimagetool --appimage-extract
          ARCH=x86_64 ./squashfs-root/AppRun AppDir "ESPAI-${VER}-x86_64.AppImage"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ESPAI-linux
          path: ESPAI-*-x86_64.AppImage
          retention-days: 5

  # ── Docker multi-arch images (amd64 + arm64, three variants) ────────────────
  #
  #   latest   — hub + Agent Bench (Claude CLI), no heavy worker deps  ~500 MB
  #   workers  — hub + Agent Bench + OpenCV / FFmpeg / numpy           ~900 MB
  #   slim     — hub only, smallest possible image                     ~350 MB
  #
  build-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false   # build all variants even if one fails
      matrix:
        include:
          - variant: latest
            install_claude: "true"
            install_worker_deps: "false"
            tag_suffix: ""
            floating_tag: "latest"
          - variant: workers
            install_claude: "true"
            install_worker_deps: "true"
            tag_suffix: "-workers"
            floating_tag: "workers"
          - variant: slim
            install_claude: "false"
            install_worker_deps: "false"
            tag_suffix: "-slim"
            floating_tag: "slim"

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build tags for this variant:
      #   v0.2.0{suffix}   0.2{suffix}   {floating_tag}  (non-pre-release only)
      - name: Compute image tags
        id: tags
        run: |
          VER="${{ github.ref_name }}"
          VER="${VER#v}"
          MINOR="${VER%.*}"
          SUFFIX="${{ matrix.tag_suffix }}"
          REPO="ghcr.io/${{ github.repository }}"
          IS_PRE=$([[ "${{ github.ref_name }}" == *"-"* ]] && echo true || echo false)

          TAGS="${REPO}:${VER}${SUFFIX},${REPO}:${MINOR}${SUFFIX}"
          if [ "$IS_PRE" = "false" ]; then
            TAGS="${TAGS},${REPO}:${{ matrix.floating_tag }}"
          fi
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Build and push — ${{ matrix.variant }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: hub/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            INSTALL_CLAUDE=${{ matrix.install_claude }}
            INSTALL_WORKER_DEPS=${{ matrix.install_worker_deps }}
          # Each variant gets its own GHA cache scope to avoid cross-variant
          # cache pollution from differing build args.
          cache-from: type=gha,scope=docker-${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.variant }}

  # ── GitHub Release ────────────────────────────────────────────────────────
  release:
    needs: [build-windows, build-linux, build-docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: ESPAI-windows-installer
          path: artifacts/

      - name: Download Linux AppImage
        uses: actions/download-artifact@v4
        with:
          name: ESPAI-linux
          path: artifacts/

      - name: Generate release notes
        id: notes
        run: |
          PREV=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -n "$PREV" ]; then
            NOTES=$(git log "$PREV"..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            NOTES=$(git log --pretty=format:"- %s (%h)" --no-merges | head -40)
          fi
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "ESPAI ${{ github.ref_name }}"
          body: |
            ## ESPAI ${{ github.ref_name }}

            Local-first ESP32 fleet management hub.

            ### Download

            | Platform | File | Notes |
            |---|---|---|
            | **Windows** | `ESPAI-Setup-{version}.exe` | Installer — no admin required |
            | **Linux x86-64** | `ESPAI-{version}-x86_64.AppImage` | `chmod +x` then run |
            | **Docker** (amd64 / arm64) | `ghcr.io/picklepc/espai:${{ github.ref_name }}` | All platforms |

            **Windows:** ESPAI starts silently in the system tray after install.
            Right-click the icon → Open Dashboard / Open Logs / Start at Login.

            **Linux:** Works on Ubuntu, Fedora, Arch, and most x86-64 distros.
            System tray requires a compatible desktop environment.

            **Docker** — headless, amd64 + arm64, three variants:

            | Tag | Includes | Size |
            |---|---|---|
            | `:${{ github.ref_name }}` / `:latest` | Hub + Agent Bench (Claude CLI) | ~500 MB |
            | `:${{ github.ref_name }}-workers` / `:workers` | + OpenCV, FFmpeg, numpy, scipy | ~900 MB |
            | `:${{ github.ref_name }}-slim` / `:slim` | Hub only | ~350 MB |

            ```bash
            # Docker auto-selects amd64 or arm64 — copy .env.example → .env first
            docker pull ghcr.io/picklepc/espai:latest        # hub + agent bench
            docker pull ghcr.io/picklepc/espai:workers       # + opencv / ffmpeg workers
            docker compose up -d
            ```

            ### Changes
            ${{ steps.notes.outputs.NOTES }}
          files: |
            artifacts/ESPAI-Setup-*.exe
            artifacts/ESPAI-*-x86_64.AppImage
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
