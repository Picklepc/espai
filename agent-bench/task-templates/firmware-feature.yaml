schema: ESPAI.task-template.v1
id: firmware-feature
name: "Firmware Feature"
description: "Add a new capability to an ESP32 project's firmware. Requires a project context — paths are inferred from the project directory."
applicable_types: [esp32, hybrid]
# No default_allowed_paths — paths are inferred from project context.
# firmware/seed/ and firmware/provision/ are ALWAYS protected and must never appear here.
default_allowed_paths: []
acceptance_criteria_template:
  - "Firmware compiles without errors (pio run)"
  - "Build imported to OTA catalog (POST /api/projects/{project_id}/import-build)"
  - "New feature does not increase flash usage beyond 70%"
  - "No hardcoded credentials, network addresses, or MAC addresses"
  - "Serial output is informative and uses [TAG] prefix"
checks:
  - platformio_build
  - espai_validate
suggested_context_questions:
  - "Which board environment is the target?"
  - "Should the feature degrade gracefully if the peripheral is absent?"
  - "Does this touch WiFi, OTA, or pairing logic?"
