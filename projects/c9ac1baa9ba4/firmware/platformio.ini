; Jingle Bells — ESPAI Project Firmware
; Set WIFI credentials via environment variables before building:
;   $env:ESPAI_WIFI_SSID = "MyNetwork"
;   $env:ESPAI_WIFI_PASS = "mypassword"

[platformio]
default_envs = seeed_xiao_esp32s3

[env]
framework    = arduino
monitor_speed = 115200
lib_deps =
  bblanchon/ArduinoJson@^7.0.0
build_flags =
  -D FW_VERSION="0.1.0"
  -D NODE_NAME="jingle-bells"
  -D WIFI_SSID="${sysenv.ESPAI_WIFI_SSID}"
  -D WIFI_PASS="${sysenv.ESPAI_WIFI_PASS}"

[env:seeed_xiao_esp32s3]
platform = espressif32
board    = seeed_xiao_esp32s3
build_flags = ${env.build_flags} -D BOARD_ID="seeed_xiao_esp32s3"

[env:esp32dev]
platform = espressif32
board    = esp32dev
build_flags = ${env.build_flags} -D BOARD_ID="esp32dev"
